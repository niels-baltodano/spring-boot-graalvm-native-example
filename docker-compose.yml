# --- SHARED SETTINGS ---
x-defaults: &defaults
  # env_file: .env
  platform: linux/amd64
  restart: unless-stopped
  networks:
    - spring-graalvm_net
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-healthcheck: &healthcheck
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 10s

x-app-base: &app-base
  <<: *defaults
  image: spring-boot-graalvm-samples:${TAG:-latest}

# --- SERVICES ---
services:
  spring-boot-graalvm-native:
    <<: *app-base
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8080}:8080"
    healthcheck:
      <<: *healthcheck
      test:
        - CMD
        - /app/application
        - -XX:+PrintFlagsFinal
        - -version
    deploy:
      resources:
        limits:
          cpus: "${APP_CPU_LIMIT:-1.0}"
          memory: ${APP_MEMORY_LIMIT:-512M}

# --- NETWORKS ---
networks:
  spring-graalvm_net:
    driver: bridge